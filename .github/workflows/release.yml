name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
      - name: Run checks
        run: make test
      - name: Build release assets
        run: scripts/build-release.sh
      - name: Upload GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/relaypilot_*
